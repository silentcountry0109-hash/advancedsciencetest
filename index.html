<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1f3a">
<title>國中理化資優鑑測題型練習 ‧ 教用詳解 ‧ 尤瑞卡科學</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper:    #f5f1e8;
  --paper-2:  #ede7d6;
  --ink:      #2d2826;
  --ink-soft: #4d4540;
  --sumi:     #4d4d54;
  --gold:     #a48748;
  --gold-soft:#c9b88a;
  --rule:     #d8d2bf;
  --hover:    #e8e0c8;
  --active:   #0a1f3a;
  --shadow:   0 1px 3px rgba(45,40,38,0.08), 0 2px 8px rgba(45,40,38,0.05);
  --sidebar-w: 320px;
  --brand-h: 56px;
  --footer-h: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

/* === 典陸 brand 頁首 === */
.brand-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 28px 12px;
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 50;
  gap: 12px;
}
.brand-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex-shrink: 0; }
.brand-zh { color: var(--sumi); letter-spacing: 0.4em; font-size: 13px; }
.brand-en { color: var(--gold); letter-spacing: 0.28em; font-size: 10.5px; font-weight: 300; }
.brand-center {
  text-align: center; flex: 1; min-width: 0;
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.3em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-center .sub {
  display: block;
  color: var(--gold);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 9px;
  letter-spacing: 0.5em;
  font-weight: 300;
  margin-top: 3px;
}
.brand-slogan {
  color: var(--gold);
  letter-spacing: 0.3em;
  font-size: 11px;
  font-weight: 300;
  text-align: right;
  flex-shrink: 0;
}

/* === 漢堡按鈕 (手機版) === */
.menu-btn {
  display: none;
  background: none; border: none;
  cursor: pointer;
  padding: 6px 10px;
  margin-right: 4px;
  flex-shrink: 0;
  color: var(--ink);
}
.menu-btn svg { display: block; width: 24px; height: 24px; }

/* === 主容器 === */
.main {
  display: flex;
  height: calc(100vh - var(--brand-h) - var(--footer-h));
  height: calc(100dvh - var(--brand-h) - var(--footer-h));
  overflow: hidden;
}

/* === Sidebar === */
.sidebar {
  width: var(--sidebar-w);
  background: var(--paper);
  border-right: 1px solid var(--rule);
  overflow-y: auto;
  padding: 18px 0 30px;
  flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

.sidebar-title {
  padding: 6px 28px 12px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 12px;
}
.sidebar-title .zh {
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.3em;
  display: block;
}
.sidebar-title .en {
  color: var(--gold);
  font-size: 9px;
  letter-spacing: 0.35em;
  font-weight: 300;
  margin-top: 5px;
  display: block;
}

.vol-group { margin-bottom: 6px; }
.vol-header {
  padding: 13px 28px 5px;
  color: var(--active);
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.35em;
}
.vol-header .grade {
  margin-left: 8px;
  color: var(--sumi);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.1em;
}
.vol-rule {
  margin: 0 28px;
  height: 1px;
  background: linear-gradient(to right, var(--gold-soft), var(--rule));
}

.ch-item {
  display: block;
  padding: 10px 28px 10px 36px;
  color: var(--ink-soft);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  border-left: 2px solid transparent;
  position: relative;
}
.ch-item:hover { background: var(--hover); color: var(--ink); border-left-color: var(--gold-soft); }
.ch-item.active {
  background: var(--paper-2);
  color: var(--active);
  font-weight: 500;
  border-left-color: var(--gold);
}
.ch-item .ch-num {
  display: inline-block;
  min-width: 50px;
  color: var(--sumi);
  font-size: 11.5px;
  letter-spacing: 0.2em;
}
.ch-item.active .ch-num { color: var(--gold); }

/* === 內容區 === */
.viewer-wrap {
  flex: 1;
  background: var(--paper-2);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

.viewer-header {
  position: sticky; top: 0; z-index: 10;
  padding: 14px 24px;
  background: rgba(245, 241, 232, 0.95);
  backdrop-filter: saturate(180%) blur(8px);
  -webkit-backdrop-filter: saturate(180%) blur(8px);
  border-bottom: 1px solid var(--rule);
}
.viewer-title {
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.15em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.viewer-title .vol {
  color: var(--gold);
  font-size: 11px;
  letter-spacing: 0.4em;
  font-weight: 300;
  margin-right: 12px;
  font-family: 'Noto Sans TC', sans-serif;
}

.pages-container {
  padding: 24px 24px 40px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  align-items: center;
  max-width: 1000px;
  margin: 0 auto;
}

.page-img {
  width: 100%;
  max-width: 880px;
  height: auto;
  display: block;
  background: #fff;
  box-shadow: var(--shadow);
  border-radius: 2px;
}

.page-marker {
  text-align: center;
  color: var(--sumi);
  font-size: 10.5px;
  letter-spacing: 0.45em;
  font-weight: 300;
  padding: 4px 0 0;
}

/* === Empty state === */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 30px;
  text-align: center;
  color: var(--sumi);
  min-height: 100%;
}
.empty-state .seal {
  width: 90px; height: 90px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-weight: 900;
  font-size: 30px;
  color: var(--gold);
  margin-bottom: 26px;
  background: var(--paper);
}
.empty-state .em-title {
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 0.4em;
  margin-bottom: 12px;
}
.empty-state .em-sub {
  color: var(--gold);
  font-size: 11px;
  letter-spacing: 0.5em;
  margin-bottom: 24px;
}
.empty-state .em-rule {
  width: 50px; height: 0.5px;
  background: var(--gold-soft);
  margin: 0 auto 24px;
}
.empty-state .em-text {
  color: var(--ink-soft);
  font-size: 13px;
  letter-spacing: 0.15em;
  line-height: 2;
  max-width: 420px;
}
.empty-state .em-hint {
  margin-top: 30px;
  color: var(--sumi);
  font-size: 11px;
  letter-spacing: 0.4em;
}

/* === 頁尾 === */
.brand-footer {
  padding: 11px 28px;
  text-align: center;
  color: var(--sumi);
  border-top: 1px solid var(--rule);
  font-size: 10.5px;
  letter-spacing: 0.4em;
  background: var(--paper);
  flex-shrink: 0;
  height: var(--footer-h);
}
.brand-footer .imprint {
  color: var(--gold);
  font-size: 9px;
  letter-spacing: 0.5em;
  margin-left: 14px;
}

/* === Sidebar 遮罩 (手機版) === */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(20, 18, 16, 0.5);
  z-index: 99;
}
.sidebar-overlay.show { display: block; }

/* === 響應式 === */
@media (max-width: 880px) {
  :root { --brand-h: 50px; --footer-h: 34px; }
  .brand-bar { padding: 10px 14px; }
  .brand-zh { font-size: 11px; letter-spacing: 0.25em; }
  .brand-en { font-size: 8.5px; letter-spacing: 0.2em; }
  .brand-center { display: none; }
  .brand-slogan { font-size: 9px; letter-spacing: 0.2em; }
  .menu-btn { display: block; }

  .sidebar {
    position: fixed;
    top: var(--brand-h); bottom: var(--footer-h);
    left: 0;
    width: 280px;
    z-index: 100;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.08);
  }
  .sidebar.open { transform: translateX(0); }

  .viewer-header { padding: 11px 16px; }
  .viewer-title { font-size: 13px; }
  .viewer-title .vol { font-size: 10px; letter-spacing: 0.25em; margin-right: 8px; display: block; margin-bottom: 3px; }

  .pages-container { padding: 14px 10px 30px; gap: 12px; }
  .page-img { box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .brand-footer { padding: 8px 14px; font-size: 9.5px; letter-spacing: 0.3em; }
  .brand-footer .imprint { display: none; }
}

@media (max-width: 480px) {
  .brand-zh { font-size: 10px; letter-spacing: 0.2em; }
  .brand-en { display: none; }
  .brand-slogan { display: none; }
  .pages-container { padding: 10px 6px 24px; }
}

/* iOS safe area */
@supports (padding: max(0px)) {
  .brand-bar { padding-left: max(28px, env(safe-area-inset-left)); padding-right: max(28px, env(safe-area-inset-right)); }
  .brand-footer { padding-left: max(28px, env(safe-area-inset-left)); padding-right: max(28px, env(safe-area-inset-right)); padding-bottom: max(11px, env(safe-area-inset-bottom)); }
  @media (max-width: 880px) {
    .brand-bar { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
    .brand-footer { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
  }
}
</style>
</head>
<body>

<header class="brand-bar">
  <button class="menu-btn" id="menu-btn" aria-label="開啟章節選單">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="4" y1="7"  x2="20" y2="7"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="17" x2="20" y2="17"/>
    </svg>
  </button>
  <div class="brand-left">
    <span class="brand-zh">典 陸 教 育 集 團</span>
    <span class="brand-en">DANLU&nbsp;&nbsp;EDUCATION&nbsp;&nbsp;GROUP</span>
  </div>
  <div class="brand-center">
    國中理化資優鑑測題型練習
    <span class="sub">TEACHER&nbsp;&nbsp;EDITION&nbsp;&nbsp;·&nbsp;&nbsp;EUREKA&nbsp;&nbsp;SCIENCE</span>
  </div>
  <div class="brand-slogan">升 學 的 事 &nbsp;&nbsp; 典 陸 解 決</div>
</header>

<div class="main">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">
      <span class="zh">章 節 索 引</span>
      <span class="en">CHAPTER &nbsp; INDEX</span>
    </div>
    <nav id="nav"></nav>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="viewer-wrap" id="viewer">
    <div id="empty-state" class="empty-state">
      <div class="seal">尤</div>
      <div class="em-title">教 用 詳 解</div>
      <div class="em-sub">TEACHER &nbsp; EDITION</div>
      <div class="em-rule"></div>
      <div class="em-text">
        本平台收錄 6 冊共 18 章<br>
        國中理化資優鑑測題型完整教用解析<br>
        請由左側目錄選擇欲檢閱之章節
      </div>
      <div class="em-hint">尤 瑞 卡 科 學 &nbsp;·&nbsp; 出 品</div>
    </div>
  </main>

</div>

<footer class="brand-footer">
  專 業 升 國 中 &nbsp;·&nbsp; 升 高 中 &nbsp;·&nbsp; 升 大 學
  <span class="imprint">尤 瑞 卡 科 學 ‧ EUREKA SCIENCE</span>
</footer>

<script>
const VOLUMES = [
  { num: '三', grade: '8 上', files: [
      { ch: 1, title: '基本測量與科學概念',     folder: '108自然8上資優試題理化篇ch1-教用', pages: 4 },
      { ch: 2, title: '認識物質',               folder: '108自然8上資優試題理化篇ch2-教用', pages: 3 },
      { ch: 3, title: '波動與聲音',             folder: '108自然8上資優試題理化篇ch3-教用', pages: 3 },
      { ch: 4, title: '光、影像與顏色',         folder: '108自然8上資優試題理化篇ch4-教用', pages: 5 },
      { ch: 5, title: '溫度與熱',               folder: '108自然8上資優試題理化篇ch5-教用', pages: 3 },
      { ch: 6, title: '物質的基本結構',         folder: '108自然8上資優試題理化篇ch6-教用', pages: 3 },
  ]},
  { num: '四', grade: '8 下', files: [
      { ch: 1, title: '化學反應',               folder: '108自然8下資優試題理化篇ch1-教用', pages: 3 },
      { ch: 2, title: '氧化還原反應',           folder: '108自然8下資優試題理化篇ch2-教用', pages: 3 },
      { ch: 3, title: '電解質和酸鹼鹽',         folder: '108自然8下資優試題理化篇ch3-教用', pages: 3 },
      { ch: 4, title: '反應速率與平衡',         folder: '108自然8下資優試題理化篇ch4-教用', pages: 3 },
      { ch: 5, title: '有機化合物',             folder: '108自然8下資優試題理化篇ch5-教用', pages: 3 },
      { ch: 6, title: '力與壓力',               folder: '108自然8下資優試題理化篇ch6-教用', pages: 3 },
  ]},
  { num: '五', grade: '9 上', files: [
      { ch: 1, title: '直線運動',               folder: '108自然9上資優試題理化、地科篇Ch1-教用', pages: 4 },
      { ch: 2, title: '力與運動',               folder: '108自然9上資優試題理化、地科篇Ch2-教用', pages: 3 },
      { ch: 3, title: '能量──由功到熱',         folder: '108自然9上資優試題理化、地科篇Ch3-教用', pages: 3 },
      { ch: 4, title: '電流、電壓與歐姆定律',   folder: '108自然9上資優試題理化、地科篇Ch4-教用', pages: 5 },
  ]},
  { num: '六', grade: '9 下', files: [
      { ch: 1, title: '電流的熱效應與化學效應', folder: '108自然9下資優試題理化地科篇Ch1-教用', pages: 4 },
      { ch: 2, title: '電與磁',                 folder: '108自然9下資優試題理化地科篇Ch2-教用', pages: 4 },
  ]},
];

const nav = document.getElementById('nav');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
const menuBtn = document.getElementById('menu-btn');
const viewer = document.getElementById('viewer');

VOLUMES.forEach(vol => {
  const grp = document.createElement('div');
  grp.className = 'vol-group';
  grp.innerHTML = `
    <div class="vol-header">第 ${vol.num} 冊<span class="grade">${vol.grade}</span></div>
    <div class="vol-rule"></div>
  `;
  vol.files.forEach(f => {
    const a = document.createElement('a');
    a.className = 'ch-item';
    a.dataset.folder = f.folder;
    a.dataset.pages  = f.pages;
    a.dataset.title  = f.title;
    a.dataset.vol    = vol.num;
    a.dataset.ch     = f.ch;
    a.innerHTML = `<span class="ch-num">第 ${f.ch} 章</span><span class="ch-title">${f.title}</span>`;
    a.addEventListener('click', e => { e.preventDefault(); selectChapter(a); });
    grp.appendChild(a);
  });
  nav.appendChild(grp);
});

function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
menuBtn.addEventListener('click', openSidebar);
overlay.addEventListener('click', closeSidebar);

function selectChapter(el) {
  document.querySelectorAll('.ch-item.active').forEach(x => x.classList.remove('active'));
  el.classList.add('active');

  const folder = el.dataset.folder;
  const pages  = parseInt(el.dataset.pages, 10);
  const title  = el.dataset.title;
  const vol    = el.dataset.vol;
  const ch     = el.dataset.ch;

  // 建立內容
  const headerHTML = `
    <div class="viewer-header">
      <div class="viewer-title">
        <span class="vol">第 ${vol} 冊 &nbsp;·&nbsp; 第 ${ch} 章</span>${title}
      </div>
    </div>
    <div class="pages-container" id="pages-container"></div>
  `;
  viewer.innerHTML = headerHTML;
  const container = document.getElementById('pages-container');

  for (let i = 1; i <= pages; i++) {
    const img = document.createElement('img');
    img.className = 'page-img';
    img.alt = `第 ${vol} 冊 第 ${ch} 章 p.${i}`;
    img.loading = 'lazy';
    img.decoding = 'async';
    img.src = `pages/${encodeURIComponent(folder)}/page-${i}.jpg`;
    container.appendChild(img);

    const marker = document.createElement('div');
    marker.className = 'page-marker';
    marker.textContent = `— ${i} / ${pages} —`;
    container.appendChild(marker);
  }

  viewer.scrollTop = 0;
  closeSidebar();
  try { localStorage.setItem('lastChapter', folder); } catch (e) {}
}

try {
  const last = localStorage.getItem('lastChapter');
  if (last) {
    const el = document.querySelector(`[data-folder="${last}"]`);
    if (el) selectChapter(el);
  }
} catch (e) {}
</script>

</body>
</html>
